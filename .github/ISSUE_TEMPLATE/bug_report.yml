name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Gapo is affected?
      options:
        - Client (gapo)
        - Server (gapo-server)
        - TUI Dashboard
        - Self-Update
    validations:
      required: true

  - type: dropdown
    id: tunnel-mode
    attributes:
      label: Tunnel Mode
      description: Which tunnel mode were you using?
      options:
        - HTTP/HTTPS
        - TCP
        - WebSocket
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run 'gapo --http myapp 3000'
        2. Send a request to the tunnel URL
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error messages.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Gapo Version
      description: Output of `gapo --version` or `gapo-server --version`.
      placeholder: e.g. v1.0.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS / Platform
      description: Which operating system are you using?
      options:
        - Linux (amd64)
        - Linux (arm64)
        - macOS (amd64)
        - macOS (arm64)
        - Windows (amd64)
        - Windows (arm64)
        - FreeBSD (amd64)
        - FreeBSD (arm64)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant flags or config file settings (redact your token).
      placeholder: |
        gapo --server tunnel.example.com:19443 --http myapp 3000
      render: bash
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Relevant log output or error messages. Use `--no-tui` for plain log output.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context or screenshots.
    validations:
      required: false
